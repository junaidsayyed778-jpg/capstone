apiVersion: skaffold/v4beta13
kind: Config

build:
  local:
    push: false

  tagPolicy:
    sha256: {}

  artifacts:
    - image: ai-orchestration
      context: ai-orchestration
      docker:
        dockerfile: Dockerfile

    - image: auth
      context: auth
      docker:
        dockerfile: Dockerfile

    - image: notification
      context: notification
      docker:
        dockerfile: Dockerfile

    - image: agent
      context: sandbox/agent
      docker:
        dockerfile: Dockerfile

    - image: router
      context: sandbox/router
      docker:
        dockerfile: Dockerfile

    - image: sandbox
      context: sandbox/server
      docker:
        dockerfile: Dockerfile

    - image: template
      context: sandbox/template
      docker:
        dockerfile: Dockerfile

manifests:
  rawYaml:
    # Updated: Replaced k8s/secrets.yml with the 4 individual secret files
    - k8s/database-secret.yml
    - k8s/jwt-secret.yml
    - k8s/google-secret.yml
    - k8s/ai-secret.yml
    
    - k8s/rbac.yml

    - k8s/ai-deployment.yml
    - k8s/ai-service.yml

    - k8s/authDeployment.yml
    - k8s/authService.yml

    - k8s/notification-deployment.yml
    - k8s/notification-service.yml

    - k8s/routerDeployment.yml
    - k8s/routerService.yml

    - k8s/sandboxDeployment.yml
    - k8s/sandboxService.yml

    - k8s/ingress.yml