apiVersion: apps/v1
kind: Deployment

metadata:
  name: sandbox-deployment
  labels:
    app: sandbox-api

spec:
  replicas: 1

  selector:
    matchLabels:
      app: sandbox-api

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: sandbox-api

    spec:
      serviceAccountName: resource-manager

      containers:
        - name: main-sandbox-container

          image: sandbox

          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 3000


          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: database
                  key: REDIS_URL

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt
                  key: JWT_SECRET   

            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: database
                  key: SANDBOX             


          resources:
            requests:
              cpu: "250m"
              memory: "200Mi"

            limits:
              cpu: "500m"
              memory: "400Mi"


          readinessProbe:
            httpGet:
              path: /api/sandbox/ready
              port: http

            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5


          livenessProbe:
            httpGet:
              path: /api/sandbox/health
              port: http

            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5