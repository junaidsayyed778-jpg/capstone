apiVersion: apps/v1
kind: Deployment

metadata:
  name: sandbox-deployment
  labels:
    app: sandbox-api

spec:
  replicas: 1

  selector:
    matchLabels:
      app: sandbox-api

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  template:
    metadata:
      labels:
        app: sandbox-api

    spec:
      serviceAccountName: resource-manager

      containers:
        - name: main-sandbox-container

          image: localhost/sandbox:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 3000

          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: database
                  key: REDIS_URL

          resources:
            requests:
              cpu: "250m"
              memory: "200Mi"

            limits:
              cpu: "500m"
              memory: "400Mi"

          readinessProbe:
            httpGet:
              path: /api/sandbox/ready
              port: 3000
            initialDelaySeconds: 30
            timeoutSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/sandbox/health
              port: 3000
            initialDelaySeconds: 90
            timeoutSeconds: 10